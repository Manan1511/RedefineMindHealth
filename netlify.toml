[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback — all routes serve index.html so React Router handles them.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Environment variables to set in the Netlify dashboard
# (Dashboard → Site → Environment variables):
#
#   VITE_SUPABASE_URL      = https://YOUR_PROJECT_REF.supabase.co
#   VITE_SUPABASE_ANON_KEY = your-anon-key
#   VITE_ADMIN_PASSWORD    = the admin password
